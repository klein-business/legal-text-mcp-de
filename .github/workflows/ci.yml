name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.10.12"
          enable-cache: true

      - name: Sync
        run: uv sync --locked --all-groups

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck-strict:
    name: Mypy strict (scripts)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.10.12"
          enable-cache: true

      - name: Sync
        run: uv sync --locked --all-groups

      - name: Mypy strict on scripts/
        run: uv run --group dev mypy scripts

  typecheck-warn:
    name: Mypy plain (src) [non-blocking]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.10.12"
          enable-cache: true

      - name: Sync
        run: uv sync --locked --all-groups

      - name: Mypy on src/ (warning-gate)
        # `mypy` (no args) uses [tool.mypy].files = ["scripts", "src"] from
        # pyproject.toml. The strict-ratcheted modules (config, http_models,
        # legal_texts.{errors,models,sources}, cli.*) are validated by the
        # `typecheck-strict-cli` job below. Modules still under the warning
        # gate are surfaced here but do not fail CI.
        run: uv run --group dev mypy 2>&1 | tee mypy-summary.txt || true

      - name: Upload mypy summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.4.4
        with:
          name: mypy-summary
          path: mypy-summary.txt
          retention-days: 14

  typecheck-strict-cli:
    name: Mypy strict (cli + http_api)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.10.12"
          enable-cache: true

      - name: Sync
        run: uv sync --locked --all-groups

      - name: Mypy strict on cli/ + http_api
        # Strict-ratcheted modules — hard-fail on any regression. Extends
        # the v2.1.1 post-#96 ratchet (cli/*) with http_api (post-#97).
        # Together these cover the user-facing API surface.
        run: |
          uv run --group dev mypy --strict src/legal_text_mcp_de/cli/
          uv run --group dev mypy --strict src/legal_text_mcp_de/http_api.py

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.10.12"
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Sync
        run: uv sync --locked --all-groups

      - name: Pytest with coverage
        run: uv run --group dev pytest tests --cov=src/legal_text_mcp_de --cov-report=xml

      - name: Upload coverage XML
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.4.4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  lock-integrity:
    name: Lockfile integrity
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.10.12"
          enable-cache: true

      - name: Check lock matches pyproject
        run: uv lock --check

  build:
    name: Build (sdist + wheel)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.10.12"
          enable-cache: true

      - name: Sync
        run: uv sync --locked --all-groups

      - name: Build
        run: uv build || echo "Build skipped — package = false in [tool.uv]. Phase 4 introduces hatchling."
