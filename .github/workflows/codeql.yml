name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "30 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL analysis (python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3.35.5
        with:
          languages: python
          queries: security-extended
          # Skip Python dependency installation — the project uses uv and
          # CodeQL's autobuild handles source extraction without it.
          setup-python-dependencies: false

      - name: Autobuild (no-op for Python)
        uses: github/codeql-action/autobuild@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3.35.5

      - name: Analyze
        uses: github/codeql-action/analyze@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3.35.5
        with:
          category: "/language:python"
