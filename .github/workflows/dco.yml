name: DCO

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco:
    # Always runs so a required status is emitted on every PR; the actual
    # DCO check is skipped for Dependabot-labelled PRs because Dependabot
    # commits are made by a bot account and DCO does not apply.
    name: DCO sign-off check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Skip for dependencies-labelled PRs
        if: ${{ contains(github.event.pull_request.labels.*.name, 'dependencies') }}
        run: echo "Skipped (dependencies label) — Dependabot commits do not require DCO sign-off."

      - name: Get PR commits
        id: pr-commits
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'dependencies') }}
        uses: tim-actions/get-pr-commits@55a16eb88c0c5e7f86c2b2fd6a0fc1e6b3e89f5b # v1.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: DCO check on every commit
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'dependencies') }}
        uses: tim-actions/dco@2fd24ae9f0e84576b48bbb1d09ba0caa31cb6a5b # v1.1.0
        with:
          commits: ${{ steps.pr-commits.outputs.commits }}
