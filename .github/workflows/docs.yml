name: Docs

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # mike pushes to gh-pages
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Configure Git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.10.12"
          enable-cache: true

      - name: Sync docs deps
        run: uv sync --group docs

      - name: Deploy dev alias on main push
        if: github.ref == 'refs/heads/main'
        run: uv run --group docs mike deploy --push --update-aliases dev

      - name: Deploy versioned + latest on tag push
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          uv run --group docs mike deploy --push --update-aliases "$VERSION" latest
          uv run --group docs mike set-default --push latest
