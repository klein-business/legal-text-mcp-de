name: MCP Registry Publish

# Publishes the server to the official Model Context Protocol Registry
# (https://registry.modelcontextprotocol.io) once the Release workflow
# finishes successfully on a `v*.*.*` tag. The registry requires
# GitHub-namespaced names (io.github.<owner>/<server>) and verifies
# ownership via GitHub Actions OIDC — no secrets, no PATs.
#
# Trigger choice: `workflow_run` (not `push: tags`) ensures we run *after*
# release.yml has actually pushed the PyPI sdist/wheel and the multi-arch
# OCI image to GHCR. A direct tag trigger would race with the publish
# pipeline and the registry would reject the publish with "PyPI package
# 'X' not found" or "OCI image 'X' not found".
#
# server.json is the source of truth for what gets published; its
# version field is bumped automatically by release-please as part of
# the normal release flow.

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate server.json without publishing"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  # Keyed on the triggering ref (the tag, or "manual" for dispatch) so
  # parallel tag pushes do not stomp on each other.
  group: mcp-registry-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Gate the job: either we were manually dispatched, OR the upstream
    # Release workflow finished successfully on a v* tag.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    permissions:
      contents: read
      id-token: write  # OIDC for github-oidc auth
    steps:
      - name: Checkout (triggering workflow's commit)
        # workflow_run runs in the default-branch context by default. Pin
        # the checkout to the SHA that the Release workflow ran against
        # so server.json reflects the exact version being published.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/
          mcp-publisher --help

      - name: Validate server.json
        # Hard-fail if the schema check fails — better to error out before
        # touching the live registry. Also catches drift between server.json
        # and the actual release artifacts.
        run: mcp-publisher validate

      - name: Verify server.json version matches triggering tag
        # The version inside server.json must match the git tag we are
        # publishing. release-please's extra-files bumps server.json
        # alongside pyproject.toml so they always agree — this guard
        # catches the case where someone bypasses release-please.
        if: ${{ github.event_name == 'workflow_run' }}
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          TAG_VERSION="${HEAD_BRANCH#v}"
          JSON_VERSION="$(jq -r '.version' server.json)"
          if [ "$TAG_VERSION" != "$JSON_VERSION" ]; then
            echo "::error::server.json version ($JSON_VERSION) does not match triggering tag ($TAG_VERSION)"
            exit 1
          fi
          echo "version match: $TAG_VERSION"

      - name: Wait for PyPI artefact propagation
        # Even after Release finishes, PyPI's CDN takes a few seconds to
        # become globally consistent. Poll the JSON endpoint until the
        # release shows up; bail after 5 min (PyPI is rarely that slow).
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="$(jq -r '.version' server.json)"
          for i in $(seq 1 30); do
            if curl -fsSL "https://pypi.org/pypi/legal-text-mcp-de/${VERSION}/json" > /dev/null 2>&1; then
              echo "PyPI has v${VERSION} (attempt ${i})"
              exit 0
            fi
            echo "PyPI not ready (attempt ${i}/30), sleeping 10s"
            sleep 10
          done
          echo "::error::PyPI did not have v${VERSION} after 5 min"
          exit 1

      - name: Wait for GHCR OCI image availability
        # Same idea for the multi-arch OCI image; the registry rejects
        # publish if the canonical image is not yet pullable.
        if: ${{ !inputs.dry_run }}
        run: |
          OCI_REF="$(jq -r '.packages[] | select(.registryType == "oci") | .identifier' server.json)"
          if [ -z "$OCI_REF" ]; then
            echo "No OCI package in server.json — skipping GHCR wait."
            exit 0
          fi
          for i in $(seq 1 30); do
            if docker manifest inspect "$OCI_REF" > /dev/null 2>&1; then
              echo "GHCR has ${OCI_REF} (attempt ${i})"
              exit 0
            fi
            echo "GHCR not ready (attempt ${i}/30), sleeping 10s"
            sleep 10
          done
          echo "::error::GHCR did not have ${OCI_REF} after 5 min"
          exit 1

      - name: Login (GitHub OIDC)
        # OIDC eliminates the need for long-lived tokens. The registry
        # verifies the OIDC claim against the io.github.<owner> namespace
        # in server.json and rejects mismatches.
        if: ${{ !inputs.dry_run }}
        run: mcp-publisher login github-oidc

      - name: Publish
        if: ${{ !inputs.dry_run }}
        run: mcp-publisher publish

      - name: Dry-run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "::notice::Dry-run mode — server.json validated but not published."
          echo "Would publish:"
          jq '{name, version, packages: [.packages[] | {registryType, identifier}]}' server.json
