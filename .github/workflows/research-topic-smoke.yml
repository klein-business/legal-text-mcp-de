name: Research-Topic smoke test

on:
  pull_request:
    paths:
      - "src/legal_text_mcp_de/tools/research_topic.py"
      - "src/legal_text_mcp_de/sampling/**"
      - ".github/workflows/research-topic-smoke.yml"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    environment: smoke-test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.14"

      - run: uv sync --group dev --group prepare-data

      - name: Run cost-capped smoke test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.SMOKE_ANTHROPIC_API_KEY }}
          SMOKE_MAX_COST_USD: "0.01"
        run: |
          # Skip if no key configured (PRs from forks)
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "No ANTHROPIC_API_KEY; skipping smoke test"
            exit 0
          fi
          uv run --group dev pytest tests/smoke/test_research_topic_haiku.py -v
