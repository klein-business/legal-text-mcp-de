name: Trivy

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - 'src/**'
      - 'pyproject.toml'
      - 'uv.lock'
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

concurrency:
  group: trivy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Trivy image scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image (local only)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          load: true
          tags: legal-text-mcp-de:trivy-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # NOTE: Trivy runs informationally. The SARIF output is uploaded
      # to GitHub Code Scanning (when the repo is public and has GHAS)
      # for triaged review. The action is set to exit 0 to avoid blocking
      # CI on transient CVE-DB differences between local and CI scanners.
      # If a real HIGH/CRITICAL CVE appears in the SARIF, address it via
      # base-image bump, package update, or documented .trivyignore entry.
      - name: Run Trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: legal-text-mcp-de:trivy-scan
          severity: HIGH,CRITICAL
          exit-code: '0'  # informational only; SARIF upload + GitHub Code Scanning gates production view
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          trivyignores: .trivyignore

      - name: Upload Trivy results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        if: always() && github.event.repository.private == false
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image
