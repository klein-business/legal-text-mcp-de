<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <title>Landesdatenschutzgesetz</title>
  </head>
  <body>
    <main data-state-law>
      <h1>Landesdatenschutzgesetz</h1>
      <section data-state-law-norm data-unit="par" data-value="1">
        <h2>§ 1 Zweck</h2>
        <p>(1) Dieses Gesetz regelt den Datenschutz der öffentlichen Stellen.</p>
        <p>(2) Es ergänzt die Datenschutz-Grundverordnung.</p>
      </section>
      <section data-state-law-norm data-unit="par" data-value="2">
        <h2>§ 2 Begriffsbestimmungen</h2>
        <p>(1) Öffentliche Stellen verarbeiten personenbezogene Daten nur nach Maßgabe dieses Gesetzes.</p>
      </section>
    </main>
  </body>
</html>
