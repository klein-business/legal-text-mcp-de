site_name: legal-text-mcp-de
site_description: MCP server, HTTP API & CLI for German federal/state legal texts with canonical IDs and cite-grade source provenance.
site_url: https://klein-business.github.io/legal-text-mcp-de
repo_url: https://github.com/klein-business/legal-text-mcp-de
repo_name: klein-business/legal-text-mcp-de
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle: { icon: material/weather-sunny, name: Switch to dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle: { icon: material/weather-night, name: Switch to light mode }

plugins:
  - search
  - mike:
      alias_type: redirect
      canonical_version: latest
  - mermaid2
  - git-revision-date-localized:
      enable_creation_date: false
      type: date
  - redirects:
      redirect_maps: {}

validation:
  nav:
    omitted_files: ignore
    not_found: warn
    absolute_links: ignore
  links:
    not_found: ignore
    absolute_links: ignore
    unrecognized_links: ignore

extra:
  version:
    provider: mike
    default: latest

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - footnotes
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Quickstart:
      - Claude Desktop: quickstart/claude-desktop.md
      - Cursor: quickstart/cursor.md
      - uvx: quickstart/uvx.md
      - Docker: quickstart/docker.md
      - stdio (offline / Claude Desktop): quickstart/stdio.md
  - CLI:
      - Reference: cli/index.md
  - Concepts:
      - Data modes: concepts/data-modes.md
      - Provenance: concepts/provenance.md
      - MCP and HTTP surface: concepts/mcp-and-http-surface.md
      - MCP-native architecture: concepts/mcp-native.md
  - MCP Resources:
      - Overview: resources/index.md
  - MCP Prompts:
      - Slash-command reference: prompts/index.md
  - MCP Tools:
      - list_laws: tools/list_laws.md
      - get_law: tools/get_law.md
      - get_norm: tools/get_norm.md
      - resolve_citation: tools/resolve_citation.md
      - search_laws: tools/search_laws.md
      - get_source_metadata: tools/get_source_metadata.md
      - get_corpus_coverage: tools/get_corpus_coverage.md
      - get_source_limitations: tools/get_source_limitations.md
      - get_related_norms: tools/get_related_norms.md
  - Smart Tools:
      - research_topic: tools/research_topic.md
  - HTTP API:
      - Overview: api/index.md
      - OpenAPI reference: api/openapi.md
      - Typed Python client: api/python-client.md
  - Operations:
      - Security: operations/security.md
      - Production deployment: operations/production-deployment.md
      - Code review: operations/code-review.md
      - SBOM: operations/sbom.md
      - Verify with cosign: operations/verify-with-cosign.md
      - Versioning: operations/versioning.md
      - Threat model: operations/threat-model.md
      - Security review (2026-05): operations/security-review-2026-05.md
      - Coverage baseline: operations/coverage-baseline.md
      - OpenSSF application: operations/openssf-application.md
      - SLSA-3: operations/slsa.md
      - Launch procedure: operations/launch-procedure.md
      - Migration v1 → v2: operations/migration-v1-v2.md
  - Contributing:
      - How to contribute: contributing/index.md
      - Code of Conduct: contributing/code-of-conduct.md
  - Community:
      - Governance: community/governance.md
      - Support: community/support.md
  - Changelog: changelog.md
  - Roadmap: roadmap.md
