[project]
name = "legal-text-mcp-de"
version = "0.1.0"
description = "German legal text MCP server and HTTP API"
requires-python = ">=3.12,<3.13"
dependencies = [
    "mcp[cli]==1.14.1",
    "rapidfuzz",
    "pydantic-settings",
    "fastapi",
    "uvicorn",
]

[dependency-groups]
dev = [
    "pytest",
    "httpx",
    "PyYAML~=6.0.1",
    "ruff",
]
prepare-data = [
    "GitPython~=3.1.32",
    "PyYAML~=6.0.1",
    "docopt~=0.6.2",
    "lxml",
    "cssselect~=1.1.0",
    "requests~=2.32.0",
    "beautifulsoup4~=4.9.3",
    "roman-numbers~=1.0.2",
]

[tool.uv]
package = false

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]
